<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="app.css">
    <title>SEARCH BAR</title>
</head>
<body>
    <!-- MODAL POPUP -->
    <div id="myModal" class="modal">
      <div class="modal-content">
            <h2>Welcome to my CALCULATOR PROGRAM!</h2>
            <p>Please use the buttons to perform calculations. Avoid using the keyboard for input to prevent errors.</p>
            <button id="closeModalBtn" type="button" onclick="closePopup()">Close</button>  
      </div>
    </div>
    
    <div class="search-container">
        <label for="search" class="main-heading">SEARCH USERS</label>
        <input type="search" id="search" placeholder="Search..." data-search>
    </div>
    <div class="user-cards" data-user-cards-container></div>
    <template data-user-template>
        <div class="card">
            <div class="header" data-header></div>
            <div class="body" data-body></div>
        </div>
    </template>

    <!-- FOOTER -->
    <div>
      <footer class="footer">
           <p>&copy; 2026 Fortune U. Emmanuel. All rights reserved.</p>
       </footer>
    </div>

    <script defer src="app.js"></script>
</body>
</html>
